<!-- ==================== FORMULAIRE DE CONTACT ==================== -->
<section id="contact" class="contact-section">
    <div class="contact-container">
        <h2 class="section-title">Contactez-nous</h2>
        <p class="contact-subtitle">Une question ? Un projet ? Nous vous répondons rapidement.</p>
        
        <form id="contact-form" class="contact-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" required placeholder="Votre nom">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com">
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Sujet</label>
                <input type="text" id="subject" name="subject" required placeholder="Ex: Formation Freelance, Développement Web...">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required placeholder="Décrivez votre demande..."></textarea>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Envoyer le message
            </button>
        </form>
    </div>
</section>
